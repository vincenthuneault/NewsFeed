<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Lecteur de nouvelle</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

  <!-- ── Écran de login ── -->
  <div id="login-screen" class="hidden" role="main" aria-label="Connexion">
    <div class="login-card">
      <h1 class="login-title">📰 Lecteur de nouvelle</h1>
      <form id="login-form" autocomplete="off">
        <input
          id="login-password"
          type="password"
          class="login-input"
          placeholder="Mot de passe"
          autocomplete="current-password"
          required
        />
        <button type="submit" class="login-btn">Connexion</button>
        <p id="login-error" class="login-error" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- ── Application ── -->
  <div id="app-screen" class="hidden">

    <!-- Barre supérieure -->
    <div id="top-bar">
      <div id="counter" aria-live="polite"></div>
      <div id="top-bar-actions">
        <button id="btn-logout" class="btn-top" aria-label="Déconnexion" title="Déconnexion">⎋</button>
      </div>
    </div>

    <!-- Barre de progression -->
    <div id="progress-track"><div id="progress-bar"></div></div>

    <!-- États -->
    <div id="loading" role="status" aria-live="polite">Chargement…</div>
    <div id="error" class="hidden" role="alert"></div>

    <!-- Fil de cartes -->
    <div id="feed" role="list" aria-label="Fil de nouvelles"></div>

  </div>

  <script type="module" src="/js/app.js"></script>

  <!-- Service worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>

</body>
</html>
