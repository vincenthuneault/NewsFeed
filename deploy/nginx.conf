server {
    listen 80;
    server_name _;

    # Statiques servis directement (images, audio, css, js)
    location /static/ {
        alias /home/vhds/NewsFeed/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /css/ {
        alias /home/vhds/NewsFeed/frontend/css/;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /js/ {
        alias /home/vhds/NewsFeed/frontend/js/;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /sw.js {
        alias /home/vhds/NewsFeed/frontend/sw.js;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
        access_log off;
    }

    location /manifest.json {
        alias /home/vhds/NewsFeed/frontend/manifest.json;
        expires 1d;
        access_log off;
    }

    # Tout le reste → Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Gzip
        gzip on;
        gzip_types application/json text/css application/javascript;
    }

    # Logs
    access_log /home/vhds/NewsFeed/logs/nginx_access.log;
    error_log  /home/vhds/NewsFeed/logs/nginx_error.log warn;
}
